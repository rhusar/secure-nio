name: Javadoc

on:
  push:
    branches:
      - main

# Required so the deploy action can push to the gh-pages branch.
permissions:
  contents: write

# Serialize deployments so concurrent pushes don't race on the gh-pages branch.
concurrency:
  group: javadoc-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    # Don't publish from forks; only the canonical repository owns the docs site.
    if: github.repository == 'rhusar/secure-nio'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Generate aggregated Javadoc
        run: mvn --batch-mode --no-transfer-progress javadoc:aggregate

      - name: Publish to gh-pages under apidocs/${{ github.ref_name }}
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: target/reports/apidocs
          # Each branch/tag gets its own versioned folder; the action's clean
          # step is scoped to this target-folder, so sibling versions are kept.
          target-folder: apidocs/${{ github.ref_name }}
